<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A0C6B"/>
      <stop offset="100%" stop-color="#1a3db5"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="rgba(45,92,246,0.35)"/>
      <stop offset="100%" stop-color="rgba(45,92,246,0)"/>
    </radialGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C88A4A"/>
      <stop offset="100%" stop-color="#B87333"/>
    </linearGradient>
    <radialGradient id="eye" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFD58A"/>
      <stop offset="60%" stop-color="#FFB84D"/>
      <stop offset="100%" stop-color="#E89A2C"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Stars -->
  <g fill="#fff" opacity="0.7">
    <circle cx="120" cy="80" r="1.5"/>
    <circle cx="220" cy="150" r="1.2"/>
    <circle cx="340" cy="60" r="1.8"/>
    <circle cx="980" cy="120" r="1.5"/>
    <circle cx="1100" cy="220" r="1.3"/>
    <circle cx="1050" cy="80" r="1.6"/>
    <circle cx="180" cy="500" r="1.4"/>
    <circle cx="60" cy="380" r="1.2"/>
    <circle cx="1140" cy="450" r="1.5"/>
    <circle cx="900" cy="540" r="1.3"/>
  </g>

  <!-- NOX owl on the right -->
  <g transform="translate(820, 130)">
    <circle cx="160" cy="160" r="170" fill="rgba(255,184,77,0.08)"/>

    <path d="M160 38 C 96 38, 64 90, 64 160 C 64 220, 110 290, 160 290 C 210 290, 256 220, 256 160 C 256 90, 224 38, 160 38 Z" fill="url(#body)"/>

    <!-- Ear tufts -->
    <path d="M96 56 L114 36 L122 70 Z" fill="#9C5F26"/>
    <path d="M224 56 L206 36 L198 70 Z" fill="#9C5F26"/>

    <!-- Belly -->
    <path d="M160 100 C 132 100, 122 132, 122 174 C 122 220, 144 270, 160 270 C 176 270, 198 220, 198 174 C 198 132, 188 100, 160 100 Z" fill="#D9A56A" opacity="0.7"/>

    <!-- Eyes -->
    <circle cx="124" cy="148" r="34" fill="#1C2340"/>
    <circle cx="196" cy="148" r="34" fill="#1C2340"/>
    <circle cx="124" cy="148" r="22" fill="url(#eye)"/>
    <circle cx="196" cy="148" r="22" fill="url(#eye)"/>
    <circle cx="124" cy="148" r="9" fill="#1C2340"/>
    <circle cx="196" cy="148" r="9" fill="#1C2340"/>
    <circle cx="120" cy="143" r="3" fill="#FFF6E0"/>
    <circle cx="192" cy="143" r="3" fill="#FFF6E0"/>

    <!-- Beak -->
    <path d="M160 178 L148 200 Q160 206 172 200 Z" fill="#FFB84D" stroke="#9C5F26" stroke-width="1.5"/>
  </g>

  <!-- Text on the left -->
  <g transform="translate(80, 230)">
    <!-- Wordmark Nightwise -->
    <g>
      <text x="0" y="0" font-family="Poppins, system-ui, sans-serif" font-weight="700" font-size="56" fill="#F5F7FA" letter-spacing="-2">Nightwise</text>
      <circle cx="208" cy="-46" r="6" fill="#FFB84D"/>
    </g>

    <!-- Headline -->
    <text x="0" y="80" font-family="Poppins, system-ui, sans-serif" font-weight="600" font-size="68" fill="#FFFFFF" letter-spacing="-2">Skip the group</text>
    <text x="0" y="160" font-family="Poppins, system-ui, sans-serif" font-weight="600" font-size="68" fill="#FFFFFF" letter-spacing="-2">chat drama.</text>

    <!-- Subhead -->
    <text x="0" y="220" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="24" fill="#8892A6">NOX plans your night out — so your mates don't have to argue about it.</text>

    <!-- Pill badge -->
    <g transform="translate(0, 270)">
      <rect width="280" height="40" rx="20" fill="rgba(255,184,77,0.12)" stroke="rgba(255,184,77,0.35)"/>
      <text x="140" y="26" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="16" fill="#FFB84D" text-anchor="middle">London's AI nightlife planner</text>
    </g>
  </g>
</svg>
